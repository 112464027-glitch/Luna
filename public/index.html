<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Luna — 婦科健康知識助理</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Playfair+Display:wght@700&display=swap');
  :root {
    --bg:#fff0f5;--surface:#fff5f8;--border:#f4c6d8;--accent:#d63384;
    --accent-soft:#e8779a;--accent-light:#ffe0ec;--pink-deep:#c2185b;
    --pink-pale:#fce4ec;--pink-mid:#f48fb1;--text:#2d1b26;
    --text-mid:#6b3a52;--text-muted:#b07090;--radius:16px;
    --shadow:0 4px 24px rgba(180,60,100,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

  /* Header */
  .header{padding:14px 22px;background:linear-gradient(135deg,#ffe4ef,#ffd6e7);border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:13px;position:sticky;top:0;z-index:100;}
  .header-avatar{width:44px;height:44px;border-radius:50%;overflow:hidden;flex-shrink:0;box-shadow:0 3px 12px rgba(214,51,132,0.28);}
  .header-title{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;}
  .header-sub{font-size:11px;color:var(--text-muted);margin-top:1px;}
  .header-badge{margin-left:auto;display:flex;align-items:center;gap:6px;background:white;border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:11px;color:var(--pink-deep);font-weight:500;}
  .dot{width:7px;height:7px;border-radius:50%;background:#e91e8c;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  /* Tabs */
  .tabs{display:flex;background:white;border-bottom:1.5px solid var(--border);padding:0 16px;gap:4px;}
  .tab-btn{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-muted);background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
  .tab-btn:hover{color:var(--accent);}
  .tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}

  .tab-panel{display:none;flex:1;flex-direction:column;}
  .tab-panel.active{display:flex;}

  /* Chat */
  #chat-panel{height:calc(100vh - 118px);}
  #messages{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:16px;background:linear-gradient(180deg,#fff5f8,#fff0f5);}
  #messages::-webkit-scrollbar{width:4px;}
  #messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}
  .message{display:flex;gap:9px;max-width:84%;animation:fadeUp 0.28s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
  .message.user{align-self:flex-end;flex-direction:row-reverse;}
  .message.bot{align-self:flex-start;}
  .msg-av{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:4px;font-size:16px;overflow:hidden;}
  .message.bot .msg-av{box-shadow:0 2px 8px rgba(214,51,132,0.25);}
  .message.user .msg-av{background:var(--pink-pale);border:1px solid var(--border);}
  .bubble-wrap{display:flex;flex-direction:column;gap:3px;}
  .sender{font-size:10px;color:var(--text-muted);padding:0 4px;}
  .msg-time{font-size:9px;color:var(--text-muted);opacity:0.7;margin-left:4px;}
  .message.user .sender{text-align:right;}
  .bubble{padding:11px 15px;font-size:14px;line-height:1.78;border-radius:var(--radius);box-shadow:0 1px 6px rgba(180,60,100,0.07);word-break:break-word;}
  .message.bot .bubble{background:transparent;border:none;border-top-left-radius:4px;padding:0;}
  .message.user .bubble{background:white;border:1px solid var(--border);border-top-right-radius:4px;white-space:pre-wrap;}
  .typing{display:flex;gap:5px;padding:4px 2px;}
  .typing span{width:7px;height:7px;border-radius:50%;background:var(--accent-soft);animation:bounce 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:0.2s;}
  .typing span:nth-child(3){animation-delay:0.4s;}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
  .error-msg{align-self:center;font-size:12px;color:#c62828;background:#fde8e8;border:1px solid #ef9a9a;border-radius:20px;padding:6px 16px;}
  .input-area{padding:12px 16px;border-top:1px solid var(--border);background:var(--surface);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;}
  #user-input{flex:1;background:white;border:1.5px solid var(--border);border-radius:16px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:10px 15px;resize:none;outline:none;max-height:110px;line-height:1.6;transition:border-color 0.2s;}
  #user-input:focus{border-color:var(--accent-soft);}
  #user-input::placeholder{color:var(--text-muted);}
  #send-btn{background:linear-gradient(135deg,var(--accent-soft),var(--accent));border:none;border-radius:14px;width:46px;height:46px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity 0.2s,transform 0.15s;box-shadow:0 3px 12px rgba(214,51,132,0.3);}
  #send-btn:hover:not(:disabled){opacity:0.88;transform:scale(1.05);}
  #send-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;box-shadow:none;}
  #send-btn svg{width:20px;height:20px;fill:white;}
  .db-badge{font-size:11px;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;border-radius:20px;padding:4px 10px;display:none;align-items:center;gap:5px;}
  .db-badge.show{display:flex;}
  .rag-select{background:white;border:1px solid var(--border);border-radius:12px;color:var(--text-mid);font-size:11px;padding:7px 8px;outline:none;max-width:116px;}
  .rag-select:focus{border-color:var(--accent-soft);}
  .lang-block{border-radius:12px;padding:11px 13px;margin-bottom:8px;}
  .lang-block:last-child{margin-bottom:0;}
  .zh-block{background:#fff5f8;border:1px solid #f9c6da;}
  .id-block{background:#fff8e1;border:1px solid #ffe082;}
  .lang-tag{font-size:11px;font-weight:600;margin-bottom:6px;}
  .zh-block .lang-tag{color:var(--pink-deep);}
  .id-block .lang-tag{color:#f57f17;}
  .lang-text{font-size:13.5px;line-height:1.8;color:var(--text);white-space:pre-wrap;}

  /* DB Panel */
  #db-panel{padding:20px;gap:16px;overflow-y:auto;}
  .sync-status{font-size:11px;padding:6px 12px;border-radius:20px;text-align:center;margin-bottom:4px;}
  .sync-ok{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;}
  .sync-loading{background:#fff8e1;color:#f57f17;border:1px solid #ffe082;}
  .sync-err{background:#fde8e8;color:#c62828;border:1px solid #ef9a9a;}
  .db-upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:28px;text-align:center;background:white;cursor:pointer;transition:all 0.2s;}
  .db-upload-zone:hover,.db-upload-zone.drag{border-color:var(--accent);background:var(--accent-light);}
  .db-upload-zone .upload-icon{font-size:32px;margin-bottom:8px;}
  .db-upload-zone p{color:var(--text-muted);font-size:13px;}
  .db-upload-zone strong{color:var(--accent);}
  #file-input{display:none;}
  .db-or{text-align:center;color:var(--text-muted);font-size:12px;margin:4px 0;}
  .text-input-box{width:100%;background:white;border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 15px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);resize:vertical;min-height:80px;outline:none;transition:border-color 0.2s;}
  .text-input-box:focus{border-color:var(--accent-soft);}
  .btn-pink{background:linear-gradient(135deg,var(--accent-soft),var(--accent));color:white;border:none;border-radius:12px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity 0.2s;}
  .btn-pink:hover{opacity:0.88;}
  .btn-pink:disabled{opacity:0.5;cursor:not-allowed;}
  .btn-outline{background:white;color:var(--accent);border:1.5px solid var(--accent);border-radius:12px;padding:7px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;}
  .btn-outline:hover{background:var(--accent-light);}
  .section-title{font-size:13px;font-weight:600;color:var(--text-mid);margin-bottom:8px;}
  .db-list{display:flex;flex-direction:column;gap:8px;}
  .db-item{background:white;border:1px solid var(--border);border-radius:12px;padding:12px 15px;display:flex;align-items:flex-start;gap:10px;}
  .db-item-icon{font-size:20px;flex-shrink:0;}
  .db-item-name{font-size:13px;font-weight:600;color:var(--text);flex:1;}
  .db-item-meta{font-size:11px;color:var(--text-muted);}
  .db-item-content{font-size:11px;color:var(--text-muted);line-height:1.5;margin-top:5px;max-height:72px;overflow:auto;white-space:pre-wrap;background:#fff8fb;border-radius:8px;padding:6px 8px;}
  .db-item-body{flex:1;min-width:0;}
  .db-item-actions{display:flex;gap:5px;flex-wrap:wrap;justify-content:flex-end;}
  .db-item-btn{background:white;border:1px solid var(--border);cursor:pointer;color:var(--text-muted);font-size:11px;padding:4px 7px;border-radius:8px;transition:all 0.2s;}
  .db-item-btn:hover{background:var(--accent-light);color:var(--accent);border-color:var(--accent-soft);}
  .db-item-del{background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:16px;padding:2px 6px;border-radius:8px;transition:all 0.2s;}
  .db-item-del:hover{background:#fde8e8;color:#c62828;}
  .db-empty{text-align:center;padding:24px;color:var(--text-muted);font-size:13px;}

  /* Log Panel */
  #log-panel{padding:20px;gap:16px;overflow-y:auto;}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
  .stat-card{background:white;border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
  .stat-num{font-size:26px;font-weight:700;color:var(--accent);font-family:'Playfair Display',serif;}
  .stat-label{font-size:11px;color:var(--text-muted);margin-top:3px;}
  .log-controls{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  .log-filter{background:white;border:1.5px solid var(--border);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--text-mid);outline:none;}
  .log-sort-btn{background:white;border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;cursor:pointer;color:var(--text-muted);transition:all 0.2s;}
  .log-sort-btn.active{background:var(--accent-light);border-color:var(--accent);color:var(--accent);font-weight:600;}
  .export-btn{margin-left:auto;}
  .log-list{display:flex;flex-direction:column;gap:10px;}
  .log-item{background:white;border:1px solid var(--border);border-radius:12px;padding:13px 15px;}
  .log-item-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
  .log-tag{font-size:10px;font-weight:600;padding:3px 9px;border-radius:20px;}
  .tag-db{background:#e8f5e9;color:#2e7d32;}
  .tag-nodb{background:#f3e5f5;color:#6a1b9a;}
  .log-time{font-size:10px;color:var(--text-muted);margin-left:auto;}
  .log-q{font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;}
  .log-a{font-size:12px;color:var(--text-muted);line-height:1.6;white-space:pre-wrap;overflow:visible;}
  .log-empty{text-align:center;padding:40px;color:var(--text-muted);font-size:13px;}

  /* Quick chips */
  .quick-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;}
  .chip{background:white;border:1.5px solid var(--border);border-radius:20px;padding:7px 14px;font-size:12px;color:var(--accent);cursor:pointer;transition:all 0.2s;font-family:'DM Sans',sans-serif;}
  .chip:hover{background:var(--accent-light);border-color:var(--accent);}
  .chip-zh{display:block;font-size:12px;color:var(--accent);font-weight:600;}
  .chip-id{display:block;font-size:10.5px;color:var(--text-muted);margin-top:2px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-avatar">
    <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
      <circle cx="22" cy="22" r="22" fill="url(#hg)"/>
      <defs><radialGradient id="hg" cx="50%" cy="40%" r="60%"><stop offset="0%" stop-color="#ffd6e8"/><stop offset="100%" stop-color="#e8779a"/></radialGradient></defs>
      <ellipse cx="22" cy="18" rx="13" ry="14" fill="#4a2040"/>
      <ellipse cx="22" cy="24" rx="11" ry="12" fill="#fde8d0"/>
      <ellipse cx="22" cy="12" rx="13" ry="7" fill="#4a2040"/>
      <ellipse cx="10" cy="22" rx="3.5" ry="6" fill="#4a2040"/>
      <ellipse cx="34" cy="22" rx="3.5" ry="6" fill="#4a2040"/>
      <ellipse cx="11" cy="24" rx="2.2" ry="2.8" fill="#fcd5b0"/>
      <ellipse cx="33" cy="24" rx="2.2" ry="2.8" fill="#fcd5b0"/>
      <ellipse cx="18" cy="23" rx="2.5" ry="2.8" fill="white"/>
      <ellipse cx="26" cy="23" rx="2.5" ry="2.8" fill="white"/>
      <circle cx="18.6" cy="23.4" r="1.6" fill="#3d1a2e"/>
      <circle cx="26.6" cy="23.4" r="1.6" fill="#3d1a2e"/>
      <circle cx="19.2" cy="22.6" r="0.6" fill="white"/>
      <circle cx="27.2" cy="22.6" r="0.6" fill="white"/>
      <ellipse cx="14.5" cy="26.5" rx="3" ry="1.8" fill="#f48fb1" opacity="0.45"/>
      <ellipse cx="29.5" cy="26.5" rx="3" ry="1.8" fill="#f48fb1" opacity="0.45"/>
      <path d="M18.5 30 Q22 33 25.5 30" stroke="#d6637a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <circle cx="29" cy="13" r="3" fill="#ff6fa8" opacity="0.9"/>
      <circle cx="29" cy="13" r="1.5" fill="#ffd6e8"/>
    </svg>
  </div>
  <div>
    <div class="header-title">Luna</div>
    <div class="header-sub">婦科健康知識助理 · 中文 & Bahasa Indonesia 🌸</div>
  </div>
  <div class="header-badge"><div class="dot"></div><span>線上中</span></div>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('chat',this)">💬 聊天</button>
  <button class="tab-btn" onclick="switchTab('db',this)">🗄️ 資料庫</button>
  <button class="tab-btn" onclick="switchTab('log',this)">🔬 實驗記錄</button>
</div>

<!-- CHAT -->
<div id="chat-panel" class="tab-panel active">
  <div id="messages"></div>
  <div class="input-area">
    <select id="rag-condition" class="rag-select" onchange="setRagCondition(this.value)" title="選擇本次 RAG 實驗條件">
      <option value="none">無資料庫</option>
      <option value="20">20 筆</option>
      <option value="60">60 筆</option>
      <option value="100">100 筆</option>
      <option value="300">300 筆</option>
    </select>
    <div id="db-active-badge" class="db-badge">📂 <span id="db-badge-text">已載入資料庫</span></div>
    <textarea id="user-input" rows="1" placeholder="詢問婦科健康問題 / Tanya masalah kesehatan wanita 🌸" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<!-- DB -->
<div id="db-panel" class="tab-panel">
  <div id="sync-status" class="sync-status sync-loading">⏳ 正在連線 Supabase…</div>

  <div class="db-upload-zone" id="drop-zone" onclick="document.getElementById('file-input').click()" ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
    <div class="upload-icon">📂</div>
    <p><strong>點擊上傳</strong>或拖放檔案到這裡</p>
    <p style="margin-top:4px">支援 CSV、JSON、TXT</p>
  </div>
  <input type="file" id="file-input" accept=".csv,.json,.txt" onchange="onFileSelect(event)" />

  <div class="db-or">── 或輸入文字 ──</div>
  <div>
    <textarea class="text-input-box" id="text-input" placeholder="直接貼上資料或輸入知識內容…" rows="3"></textarea>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn-pink" id="add-text-btn" onclick="addTextEntry()">＋ 新增到資料庫</button>
    </div>
  </div>

  <div>
    <div class="section-title">📋 已上傳的資料（<span id="db-count">0</span> 筆）· 所有裝置共用</div>
    <div class="db-list" id="db-list"><div class="db-empty">載入中…</div></div>
  </div>
  <div style="display:flex;gap:8px;padding-bottom:20px">
    <button class="btn-outline" onclick="clearAllDb()">🗑 清除全部資料</button>
  </div>
</div>

<!-- LOG -->
<div id="log-panel" class="tab-panel">
  <div class="stats-row">
    <div class="stat-card"><div class="stat-num" id="stat-total">0</div><div class="stat-label">總問答數</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-with-db">0</div><div class="stat-label">有資料庫</div></div>
    <div class="stat-card"><div class="stat-num" id="stat-no-db">0</div><div class="stat-label">無資料庫</div></div>
  </div>
  <div class="log-controls">
    <select id="log-filter" class="log-filter" onchange="setLogFilter(this.value)">
      <option value="all">全部記錄</option>
      <option value="none">無資料庫</option>
      <option value="20">20 筆資料庫</option>
      <option value="60">60 筆資料庫</option>
      <option value="100">100 筆資料庫</option>
      <option value="300">300 筆資料庫</option>
    </select>
    <button class="log-sort-btn active" onclick="setSort('time',this)" id="sort-time">🕐 依時間</button>
    <button class="log-sort-btn" onclick="setSort('db',this)" id="sort-db">📂 依資料庫</button>
    <button class="btn-outline export-btn" onclick="exportCSV()">⬇ 匯出 CSV</button>
    <button class="btn-outline" onclick="clearLog()">🗑 清除記錄</button>
  </div>
  <div class="log-list" id="log-list"><div class="log-empty">載入中…</div></div>
</div>

<script>
// ══════════════════════════════════════════════
// SUPABASE INIT
// ══════════════════════════════════════════════
const SUPABASE_URL = 'https://qwvlyskugcrsmawmchqu.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InF3dmx5c2t1Z2Nyc21hd21jaHF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMDUyMDIsImV4cCI6MjA4ODc4MTIwMn0.fSHFn1_2fy3a4OxEKO7Xxh2w_sCOZhUhC8olROWqrPg';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

// ══════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════
let isLoading = false;
let chatHistory = [];
let dbEntries = [];
let expLog = [];
let sortMode = 'time';

// ══════════════════════════════════════════════
// LOCAL RAG RETRIEVAL
// 目的：不要把整個資料庫全部塞給模型，而是先挑出與問題最相關的片段。
// 這讓 20 / 60 / 100 筆資料庫條件在實驗中真的產生差異。
// ══════════════════════════════════════════════
function normalizeText(s) {
  return (s || '')
    .toLowerCase()
    .replace(/[，。！？、；：,.!?;:()\[\]{}"'`~]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();
}

function tokenize(s) {
  const text = normalizeText(s);
  const latin = text.match(/[a-zA-Z][a-zA-Z0-9-]{1,}/g) || [];
  const zh = (text.match(/[\u4e00-\u9fff]{2,}/g) || []).flatMap(seg => {
    const grams = [];
    for (let i = 0; i < seg.length - 1; i++) grams.push(seg.slice(i, i + 2));
    return grams;
  });
  return [...latin, ...zh].filter(t => !['yang','dan','atau','saya','kamu','ini','itu','apa','bagaimana','untuk','dengan','the','and'].includes(t));
}

function parseCsv(text) {
  const rows = [];
  let row = [], cell = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const ch = text[i], next = text[i + 1];
    if (ch === '"' && inQuotes && next === '"') { cell += '"'; i++; continue; }
    if (ch === '"') { inQuotes = !inQuotes; continue; }
    if (ch === ',' && !inQuotes) { row.push(cell); cell = ''; continue; }
    if ((ch === '\n' || ch === '\r') && !inQuotes) {
      if (ch === '\r' && next === '\n') i++;
      row.push(cell); cell = '';
      if (row.some(v => v.trim() !== '')) rows.push(row);
      row = [];
      continue;
    }
    cell += ch;
  }
  row.push(cell);
  if (row.some(v => v.trim() !== '')) rows.push(row);
  if (rows.length < 2) return [];
  const headers = rows[0].map(h => h.trim());
  return rows.slice(1).map(r => Object.fromEntries(headers.map((h, i) => [h, (r[i] || '').trim()])));
}

function normalizeImportedRows(fileName, text) {
  let rows = [];
  if (/\.json$/i.test(fileName)) {
    const parsed = JSON.parse(text);
    rows = Array.isArray(parsed) ? parsed : (parsed.chunks || parsed.data || []);
  } else if (/\.csv$/i.test(fileName)) {
    rows = parseCsv(text);
  }

  if (!rows.length) {
    return [{ name: fileName, content: text, icon: '📄' }];
  }

  return rows.map((r, i) => {
    const chunkId = r.chunk_id || r.record_id || r.id || `${fileName.replace(/\W+/g, '_')}-${i + 1}`;
    const title = r.source_title || r['來源標題'] || r['標題'] || r.title || r.name || '婦科知識片段';
    const type = r.chunk_type || r['片段類型'] || r.rag_condition || '';
    const retrievalText = r.retrieval_text || r['檢索文字'] || r['中文內容'] || r['印尼文內容'] || r.content || '';
    const zh = r.answer_text_zh || r['中文內容'] || r['中文摘要'] || '';
    const id = r.answer_text_id || r['印尼文內容'] || r['自然印尼文摘要'] || '';
    const url = r.source_url || r['來源網址'] || '';
    const red = r.red_flags_id || r.red_flags_zh || r['紅旗警訊'] || '';
    const content = [
      `chunk_id: ${chunkId}`,
      `title: ${title}`,
      type ? `type: ${type}` : '',
      retrievalText ? `retrieval_text: ${retrievalText}` : '',
      zh ? `answer_zh: ${zh}` : '',
      id ? `answer_id: ${id}` : '',
      red ? `red_flags: ${red}` : '',
      url ? `source_url: ${url}` : ''
    ].filter(Boolean).join('\n');
    return { name: `${chunkId}｜${title}`, content, icon: '🧩' };
  });
}

function scoreEntry(promptText, promptTokens, entry) {
  const text = `${entry.name || ''}\n${entry.content || ''}`;
  const entryTokens = new Set(tokenize(text));
  let score = 0;
  for (const tok of promptTokens) {
    if (entryTokens.has(tok)) score += tok.length >= 5 ? 3 : 1;
    if ((entry.content || '').toLowerCase().includes(tok)) score += 0.5;
  }
  const redWords = ['darah','perdarahan','pingsan','demam','hamil','nyeri','sakit','gatal','bau','keputihan','出血','暈','發燒','懷孕','劇痛','搔癢','異味'];
  if (redWords.some(w => normalizeText(promptText).includes(w)) && /red_flags|tanda bahaya|立即就醫|警訊/i.test(entry.content || '')) score += 4;
  return score;
}

function getEntryStage(entry) {
  const text = `${entry.name || ''}\n${entry.content || ''}`.toLowerCase();
  if (/plain_id|自然印尼語回答線索/.test(text)) return '120-extra';
  if (/rag_condition:\s*20-doc/.test(text)) return '20';
  if (/rag_condition:\s*60-chunk/.test(text)) return '60';
  if (/rag_condition:\s*100-chunk/.test(text)) return '100';
  if (/rag_condition:\s*300-depth/.test(text)) return '300';
  if (/baseline_doc|20-doc|整篇摘要/.test(text)) return '20';
  if (/prep|100-chunk|就醫準備/.test(text)) return '100';
  if (/concept|symptom|red_flag|60-chunk|核心概念|症狀辨識|紅旗警訊/.test(text)) return '60';
  return 'unknown';
}

function getCandidateDbEntries() {
  if (!dbEntries.length || ragCondition === 'none') return [];
  const maxByCondition = { '20': 20, '60': 60, '100': 100, '300': 300 };
  let candidates = dbEntries.filter(e => {
    const stage = getEntryStage(e);
    if (ragCondition === '20') return stage === '20';
    if (ragCondition === '60') return stage === '60';
    if (ragCondition === '100') return stage !== '120-extra';
    if (ragCondition === '300') return ['20','60','100','300'].includes(stage);
    return false;
  });
  if (!candidates.length) {
    candidates = dbEntries.slice(0, Math.min(maxByCondition[ragCondition] || 0, dbEntries.length));
  }
  return candidates.slice(0, Math.min(maxByCondition[ragCondition] || candidates.length, candidates.length));
}

function retrieveRelevantDbEntries(prompt, topK = 5) {
  const candidates = getCandidateDbEntries();
  if (!candidates.length) return [];
  const promptTokens = tokenize(prompt);
  const ranked = candidates
    .map(e => ({ ...e, _score: scoreEntry(prompt, promptTokens, e) }))
    .filter(e => e._score > 0)
    .sort((a, b) => b._score - a._score)
    .slice(0, topK);
  return ranked.length ? ranked : candidates.slice(0, Math.min(topK, candidates.length)).map(e => ({ ...e, _score: 0 }));
}

function buildRetrievedDbContext(prompt) {
  const topKByCondition = { none: 0, '20': 2, '60': 4, '100': 7, '300': 12 };
  const hits = retrieveRelevantDbEntries(prompt, topKByCondition[ragCondition] || 5);
  const context = hits.map((e, i) => `【${getConditionLabel()}｜RAG-${i + 1}｜score=${e._score}】\n[${e.name}]\n${e.content}`).join('\n\n');
  const sources = hits.map(e => e.name).join(' ; ');
  return { context, hits, sources, condition: ragCondition, conditionLabel: getConditionLabel() };
}

function renderBotContent(text) {
  const parts = text.split(/\n---\n|\n---$/);
  if (parts.length >= 2) {
    const zh = parts[0].trim(), id = parts.slice(1).join('\n---\n').trim();
    return `<div class="lang-block zh-block"><div class="lang-tag">🇹🇼 繁體中文</div><div class="lang-text">${escHtml(zh)}</div></div><div class="lang-block id-block"><div class="lang-tag">🇮🇩 Bahasa Indonesia</div><div class="lang-text">${escHtml(id)}</div></div>`;
  }
  return `<div class="lang-text">${escHtml(text)}</div>`;
}
function addMessage(role, text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div'); div.className='message '+role;
  const isBot = role==='bot';
  div.innerHTML=`<div class="msg-av">${isBot?LUNA_SVG:'👤'}</div><div class="bubble-wrap"><div class="sender">${isBot?'Luna':'你 / Kamu'}<span class="msg-time">${getTime()}</span></div><div class="bubble">${isBot?renderBotContent(text):escHtml(text)}</div></div>`;
  msgs.appendChild(div); scrollToBottom();
}
function showTyping() {
  const msgs=document.getElementById('messages'), div=document.createElement('div');
  div.className='message bot'; div.id='typing-indicator';
  div.innerHTML=`<div class="msg-av">${LUNA_SVG}</div><div class="bubble-wrap"><div class="sender">Luna</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  msgs.appendChild(div); scrollToBottom();
}
function removeTyping() { const el=document.getElementById('typing-indicator'); if(el) el.remove(); }
function showError(msg) {
  const msgs=document.getElementById('messages'), div=document.createElement('div');
  div.className='error-msg'; div.textContent='⚠️ '+msg; msgs.appendChild(div); scrollToBottom();
}

// ══════════════════════════════════════════════
// SEND MESSAGE
// ══════════════════════════════════════════════
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('user-input');
  const prompt = input.value.trim(); if (!prompt) return;
  input.value=''; input.style.height='auto';
  document.getElementById('send-btn').disabled=true; isLoading=true;
  addMessage('user', prompt);
  chatHistory.push({role:'user', text:prompt});
  showTyping();
  const rag = buildRetrievedDbContext(prompt);
  const dbContext = rag.context;
  const hasDb = rag.hits.length > 0;
  try {
    const res = await fetch('/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({prompt, history:chatHistory.slice(-12), dbContext, retrievedSources: rag.sources, ragCondition: rag.conditionLabel})
    });
    removeTyping();
    if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e.error||'伺服器錯誤'); }
    const data = await res.json();
    const reply = data.reply||'（無回應）';
    addMessage('bot', reply);
    chatHistory.push({role:'model', text:reply});
    // Save to Supabase
    await sb.from('chat_log').insert({question:`[${rag.conditionLabel}] ${prompt}`, answer:reply, has_db:hasDb});
    await loadLog();
  } catch(err) {
    removeTyping(); showError(err.message||'連線失敗'); chatHistory.pop();
  }
  isLoading=false; document.getElementById('send-btn').disabled=false; input.focus();
}

async function loadDb() {
  setSyncStatus('loading','⏳ 同步資料庫中…');
  const {data, error} = await sb.from('db_entries').select('*').order('created_at',{ascending:true});
  if (error) { setSyncStatus('err','❌ 連線失敗：'+error.message); return; }
  dbEntries = data || [];
  renderDb();
  updateDbBadge();
  setSyncStatus('ok','✅ 已同步，所有裝置共用同一份資料庫');
}

function onDragOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('drag');}
function onDragLeave(){document.getElementById('drop-zone').classList.remove('drag');}
function onDrop(e){e.preventDefault();onDragLeave();const f=e.dataTransfer.files[0];if(f)readFile(f);}
function onFileSelect(e){const f=e.target.files[0];if(f)readFile(f);e.target.value='';}
function readFile(file) {
  const reader=new FileReader();
  reader.onload=async (e)=>{
    try {
      const entries = normalizeImportedRows(file.name, e.target.result);
      await addManyDbEntries(entries);
    } catch (err) {
      alert('檔案解析失敗：' + err.message);
    }
  };
  reader.readAsText(file,'UTF-8');
}
function addTextEntry() {
  const val=document.getElementById('text-input').value.trim(); if(!val) return;
  addDbEntry('文字輸入 '+getTime(), val, '📝');
  document.getElementById('text-input').value='';
}
async function addDbEntry(name, content, icon='📄') {
  const btn=document.getElementById('add-text-btn'); if(btn) btn.disabled=true;
  setSyncStatus('loading','⏳ 儲存中…');
  const {data, error} = await sb.from('db_entries').insert({name, content, icon}).select().single();
  if (error) { setSyncStatus('err','❌ 儲存失敗：'+error.message); if(btn) btn.disabled=false; return; }
  dbEntries.push(data); renderDb(); updateDbBadge();
  setSyncStatus('ok','✅ 已儲存，所有裝置共用');
  if(btn) btn.disabled=false;
}
async function addManyDbEntries(entries) {
  if (!entries.length) return;
  setSyncStatus('loading',`⏳ 正在匯入 ${entries.length} 筆知識片段…`);
  const payload = entries.map(e => ({ name: e.name, content: e.content, icon: e.icon || '🧩' }));
  const {data, error} = await sb.from('db_entries').insert(payload).select();
  if (error) { setSyncStatus('err','❌ 匯入失敗：'+error.message); return; }
  dbEntries.push(...(data || []));
  renderDb(); updateDbBadge();
  setSyncStatus('ok',`✅ 已匯入 ${entries.length} 筆；聊天時會自動檢索最相關 top 5 片段`);
}
async function deleteDbEntry(id) {
  const {error} = await sb.from('db_entries').delete().eq('id',id);
  if (error) { alert('刪除失敗：'+error.message); return; }
  dbEntries=dbEntries.filter(e=>e.id!==id); renderDb(); updateDbBadge();
}
async function renameDbEntry(id) {
  const item = dbEntries.find(e=>e.id===id);
  if (!item) return;
  const nextName = prompt('請輸入新的資料名稱', item.name || '');
  if (nextName === null) return;
  const name = nextName.trim();
  if (!name) return alert('名稱不能空白');
  const {data, error} = await sb.from('db_entries').update({name}).eq('id',id).select().single();
  if (error) { alert('改名失敗：'+error.message); return; }
  dbEntries = dbEntries.map(e=>e.id===id ? data : e);
  renderDb(); updateDbBadge();
}
async function editDbEntryContent(id) {
  const item = dbEntries.find(e=>e.id===id);
  if (!item) return;
  const nextContent = prompt('請修改資料內容', item.content || '');
  if (nextContent === null) return;
  const content = nextContent.trim();
  if (!content) return alert('內容不能空白');
  const {data, error} = await sb.from('db_entries').update({content}).eq('id',id).select().single();
  if (error) { alert('修改失敗：'+error.message); return; }
  dbEntries = dbEntries.map(e=>e.id===id ? data : e);
  renderDb(); updateDbBadge();
}
async function clearAllDb() {
  if (!dbEntries.length) return;
  if (!confirm('確定清除所有資料庫內容？（所有裝置都會消失）')) return;
  const {error} = await sb.from('db_entries').delete().neq('id',0);
  if (error) { alert('清除失敗：'+error.message); return; }
  dbEntries=[]; renderDb(); updateDbBadge();
}
function renderDb() {
  document.getElementById('db-count').textContent=dbEntries.length;
  const list=document.getElementById('db-list');
  if (!dbEntries.length) { list.innerHTML='<div class="db-empty">尚無資料，上傳檔案或輸入文字後所有裝置都能看到</div>'; return; }
  list.innerHTML=dbEntries.map(e=>`<div class="db-item"><div class="db-item-icon">${e.icon||'📄'}</div><div class="db-item-body"><div class="db-item-name">${escHtml(e.name)}</div><div class="db-item-meta">${(e.content||'').length.toLocaleString()} 字元</div><div class="db-item-content">${escHtml(e.content||'')}</div></div><div class="db-item-actions"><button class="db-item-btn" onclick="renameDbEntry(${e.id})">改名</button><button class="db-item-btn" onclick="editDbEntryContent(${e.id})">修改</button><button class="db-item-del" onclick="deleteDbEntry(${e.id})">✕</button></div></div>`).join('');
}
function updateDbBadge() {
  const badge=document.getElementById('db-active-badge'), text=document.getElementById('db-badge-text');
  const candidates = getCandidateDbEntries();
  badge.classList.add('show');
  if (ragCondition === 'none') text.textContent='目前條件：無資料庫（baseline）';
  else if (dbEntries.length) text.textContent=`目前條件：${getConditionLabel()}｜可用 ${candidates.length}/${dbEntries.length} 筆`;
  else text.textContent=`目前條件：${getConditionLabel()}｜尚未上傳資料`;
}

// ══════════════════════════════════════════════
async function loadLog() {
  const {data, error} = await sb.from('chat_log').select('*').order('created_at',{ascending:false}).limit(200);
  if (error) return;
  expLog = (data||[]).map(r=>({id:r.id, time:new Date(r.created_at).toLocaleString('zh-TW'), question:r.question, answer:r.answer, hasDb:r.has_db}));
  updateStats(); renderLog();
}
function updateStats() {
  document.getElementById('stat-total').textContent=expLog.length;
  document.getElementById('stat-with-db').textContent=expLog.filter(l=>l.hasDb).length;
  document.getElementById('stat-no-db').textContent=expLog.filter(l=>!l.hasDb).length;
}
function setSort(mode,btn) {
  sortMode=mode;
  document.querySelectorAll('.log-sort-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); renderLog();
}
function setLogFilter(value) {
  logFilter = value;
  renderLog();
}
function getLogCondition(log) {
  const q = log.question || '';
  if (q.includes('300 筆資料庫')) return '300';
  if (q.includes('100 筆資料庫')) return '100';
  if (q.includes('60 筆資料庫')) return '60';
  if (q.includes('20 筆資料庫')) return '20';
  if (q.includes('無資料庫')) return 'none';
  return log.hasDb ? 'db' : 'none';
}
function renderLog() {
  const list=document.getElementById('log-list');
  if (!expLog.length) { list.innerHTML='<div class="log-empty">尚無記錄，開始聊天後會自動記錄 🌸</div>'; return; }
  let logs=[...expLog];
  if (logFilter !== 'all') logs = logs.filter(l=>getLogCondition(l)===logFilter);
  if (!logs.length) { list.innerHTML='<div class="log-empty">此篩選條件目前沒有記錄</div>'; return; }
  if (sortMode==='db') logs.sort((a,b)=>b.hasDb-a.hasDb);
  list.innerHTML=logs.map(l=>`<div class="log-item"><div class="log-item-header"><span class="log-tag ${l.hasDb?'tag-db':'tag-nodb'}">${l.hasDb?'📂 有資料庫':'💬 無資料庫'}</span><span class="log-time">${l.time}</span></div><div class="log-q">Q: ${escHtml(l.question)}</div><div class="log-a">${escHtml(l.answer)}</div></div>`).join('');
}
function exportCSV() {
  if (!expLog.length) return alert('尚無記錄可匯出');
  const rows=[['時間','問題','回答','是否有資料庫']];
  expLog.forEach(l=>rows.push([l.time,l.question.replace(/"/g,'""'),l.answer.replace(/"/g,'""'),l.hasDb?'是':'否']));
  const csv=rows.map(r=>r.map(c=>`"${c}"`).join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='luna-log-'+Date.now()+'.csv'; a.click();
}
async function clearLog() {
  if (!expLog.length) return;
  if (!confirm('確定清除所有實驗記錄？（所有裝置都會消失）')) return;
  await sb.from('chat_log').delete().neq('id',0);
  expLog=[]; updateStats(); renderLog();
}
