<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luna — Sahabat Kesehatan</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,400&family=Noto+Sans+TC:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff0f5;
    --surface: #fff5f8;
    --surface2: #ffe8f0;
    --border: #f4c6d8;
    --accent: #d63384;
    --accent-soft: #e8779a;
    --accent-light: #ffe0ec;
    --pink-deep: #c2185b;
    --pink-pale: #fce4ec;
    --pink-mid: #f48fb1;
    --teal: #00897b;
    --text: #2d1b26;
    --text-mid: #6b3a52;
    --text-muted: #b07090;
    --luna-bubble: #fff0f6;
    --user-bubble: #f9f0ff;
    --radius: 18px;
    --shadow: 0 2px 20px rgba(180,60,100,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
    position: relative;
  }

  /* LEFT PANEL */
  #left-panel {
    width: 360px;
    min-width: 300px;
    background: var(--surface);
    border-right: 1.5px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    transition: width 0.35s cubic-bezier(0.4,0,0.2,1), min-width 0.35s cubic-bezier(0.4,0,0.2,1);
  }
  #left-panel.collapsed {
    width: 0;
    min-width: 0;
    border-right: none;
  }
  #left-panel.collapsed > * {
    opacity: 0;
    pointer-events: none;
  }

  /* Toggle button */
  #toggle-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: 360px;
    z-index: 100;
    width: 22px; height: 48px;
    background: var(--accent);
    border: none;
    border-radius: 0 12px 12px 0;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 2px 0 10px rgba(214,51,132,0.25);
    transition: left 0.35s cubic-bezier(0.4,0,0.2,1), background 0.2s;
  }
  #toggle-btn:hover { background: var(--pink-deep); }
  #toggle-btn svg {
    width: 12px; height: 12px; fill: white;
    transition: transform 0.35s;
  }
  #toggle-btn.collapsed-btn {
    left: 0;
  }
  #toggle-btn.collapsed-btn svg {
    transform: rotate(180deg);
  }
  .panel-header {
    padding: 22px 22px 15px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(135deg, #ffe4ef 0%, #ffd6e7 100%);
  }
  .panel-header .eyebrow {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.16em; color: var(--accent);
    text-transform: uppercase; margin-bottom: 5px;
  }
  .panel-header h2 {
    font-family: 'Playfair Display', serif;
    font-size: 19px; font-weight: 700;
    color: var(--text); line-height: 1.3;
  }
  .panel-header p {
    margin-top: 5px; font-size: 12px;
    color: var(--text-mid); line-height: 1.6;
  }
  .panel-body {
    flex: 1; overflow-y: auto;
    padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .panel-body::-webkit-scrollbar { width: 4px; }
  .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .batch-label input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 13px; padding: 8px 12px; outline: none;
    transition: border-color 0.2s;
  }
  .batch-label input:focus { border-color: var(--accent-soft); }
  .batch-label input::placeholder { color: var(--text-muted); }

  #knowledge-input {
    resize: none;
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text);
    font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    font-size: 13px; line-height: 1.7;
    padding: 12px 14px; outline: none;
    transition: border-color 0.2s; min-height: 120px;
  }
  #knowledge-input:focus { border-color: var(--accent-soft); }
  #knowledge-input::placeholder { color: var(--text-muted); }

  .btn-row { display: flex; gap: 8px; }
  .btn-primary {
    flex: 1;
    background: linear-gradient(135deg, var(--accent-soft), var(--accent));
    color: white; border: none; border-radius: 12px;
    padding: 10px 16px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 2px 8px rgba(214,51,132,0.25);
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); }
  .btn-secondary {
    background: transparent; color: var(--accent);
    border: 1.5px solid var(--accent); border-radius: 12px;
    padding: 10px 14px; font-family: 'DM Sans', sans-serif;
    font-size: 12px; cursor: pointer; transition: background 0.2s;
  }
  .btn-secondary:hover { background: var(--accent-light); }

  .section-header {
    display: flex; align-items: center;
    justify-content: space-between; margin-top: 4px;
  }
  .section-title {
    font-size: 11px; font-weight: 600;
    letter-spacing: 0.12em; color: var(--accent);
    text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .section-title::before {
    content: ''; display: inline-block;
    width: 3px; height: 12px;
    background: var(--accent); border-radius: 2px;
  }
  .db-count {
    font-size: 11px; color: var(--text-muted);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 2px 8px;
  }

  #training-log { display: flex; flex-direction: column; gap: 7px; }
  .log-item {
    background: white; border: 1px solid var(--border);
    border-radius: 12px; padding: 10px 13px;
    display: flex; align-items: center;
    justify-content: space-between;
    animation: slideIn 0.25s ease;
    box-shadow: 0 1px 4px rgba(200,60,100,0.05);
  }
  @keyframes slideIn { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .log-item-left { display: flex; align-items: center; gap: 10px; }
  .log-num {
    width: 22px; height: 22px; border-radius: 6px;
    background: var(--pink-pale); color: var(--accent);
    font-size: 11px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .log-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .log-chars { font-size: 11px; color: var(--text-muted); margin-top: 1px; }
  .log-delete {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 16px; line-height: 1;
    padding: 2px 6px; border-radius: 6px;
    transition: color 0.2s, background 0.2s;
  }
  .log-delete:hover { color: #c0392b; background: #fde8e8; }
  .log-empty {
    font-size: 12.5px; color: var(--text-muted);
    text-align: center; padding: 18px 0; font-style: italic;
  }

  .total-badge {
    background: var(--pink-pale); border: 1px solid var(--pink-mid);
    color: var(--pink-deep); border-radius: 10px;
    padding: 8px 14px; font-size: 12px; font-weight: 500;
    display: flex; align-items: center; gap: 6px;
  }

  .activate-btn {
    background: linear-gradient(135deg, #f48fb1, var(--pink-deep));
    color: white; border: none; border-radius: 14px;
    padding: 13px 16px; font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 600; cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 4px 14px rgba(194,24,91,0.3);
    letter-spacing: 0.03em;
  }
  .activate-btn:hover { opacity: 0.88; transform: translateY(-1px); }

  /* RIGHT PANEL */
  #right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  #chat-header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); box-shadow: var(--shadow);
  }
  .luna-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 14px rgba(214,51,132,0.3);
    flex-shrink: 0;
    overflow: hidden;
  }
  .header-info h3 {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-weight: 700; color: var(--text);
  }
  .header-info .subtitle { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
  .lang-badge {
    margin-left: auto; display: flex; align-items: center; gap: 6px;
    background: var(--pink-pale); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px;
    font-size: 11px; color: var(--pink-deep); font-weight: 500;
  }
  .online-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: #e91e8c; animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.35} }

  #messages {
    flex: 1; overflow-y: auto;
    padding: 22px 26px;
    display: flex; flex-direction: column; gap: 18px;
    background: linear-gradient(180deg, #fff5f8 0%, #fff0f5 100%);
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .message {
    display: flex; gap: 10px; max-width: 82%;
    animation: fadeUp 0.28s ease;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message.user { align-self: flex-end; flex-direction: row-reverse; }
  .message.bot { align-self: flex-start; }

  .msg-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    flex-shrink: 0; display: flex; align-items: center;
    justify-content: center; font-size: 17px; margin-top: 4px;
  }
  .message.bot .msg-avatar {
    background: linear-gradient(135deg, #f8bbd9, #d63384);
    box-shadow: 0 2px 8px rgba(214,51,132,0.25);
    overflow: hidden;
  }
  .message.user .msg-avatar {
    background: var(--user-bubble); border: 1px solid var(--border);
  }
  .bubble-wrap { display: flex; flex-direction: column; gap: 4px; }
  .sender-name { font-size: 11px; color: var(--text-muted); padding: 0 4px; }
  .msg-time { font-size: 10px; color: var(--text-muted); opacity: 0.7; margin-left: 4px; }
  .message.user .sender-name { text-align: right; }

  .bubble {
    padding: 12px 16px; font-size: 14px; line-height: 1.8;
    box-shadow: 0 1px 6px rgba(180,60,100,0.07);
    border-radius: var(--radius);
  }
  .message.bot .bubble {
    background: var(--luna-bubble);
    border: 1px solid #f9c6da;
    border-top-left-radius: 4px; color: var(--text);
  }
  .message.user .bubble {
    background: white; border: 1px solid var(--border);
    border-top-right-radius: 4px; color: var(--text);
  }

  /* Bilingual divider */
  .lang-divider {
    display: flex; align-items: center; gap: 8px;
    margin: 10px 0 8px;
  }
  .lang-divider::before, .lang-divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }
  .lang-divider span {
    font-size: 10px; letter-spacing: 0.1em;
    color: var(--accent); font-weight: 600; text-transform: uppercase;
    opacity: 0.7;
  }
  .zh-section { color: var(--text); }
  .id-section { color: var(--text-mid); }

  .typing-indicator { display: flex; gap: 5px; padding: 4px 2px; }
  .typing-indicator span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-soft); animation: bounce 1.2s infinite;
  }
  .typing-indicator span:nth-child(2){animation-delay:0.2s}
  .typing-indicator span:nth-child(3){animation-delay:0.4s}
  @keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

  .system-msg {
    align-self: center; font-size: 12px; color: var(--text-muted);
    background: white; border: 1px solid var(--border);
    border-radius: 20px; padding: 6px 16px;
    box-shadow: 0 1px 4px rgba(200,60,100,0.06);
  }

  #input-area {
    padding: 14px 22px; border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex; gap: 10px; align-items: flex-end;
  }
  #user-input {
    flex: 1; background: white;
    border: 1.5px solid var(--border); border-radius: 16px;
    color: var(--text); font-family: 'DM Sans', 'Noto Sans TC', sans-serif;
    font-size: 14px; padding: 11px 16px; resize: none;
    outline: none; max-height: 110px; line-height: 1.6;
    transition: border-color 0.2s;
  }
  #user-input:focus { border-color: var(--accent-soft); }
  #user-input::placeholder { color: var(--text-muted); }
  #send-btn {
    background: linear-gradient(135deg, var(--accent-soft), var(--accent));
    border: none; border-radius: 14px;
    width: 46px; height: 46px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: opacity 0.2s, transform 0.15s;
    box-shadow: 0 3px 12px rgba(214,51,132,0.3);
  }
  #send-btn:hover { opacity: 0.88; transform: scale(1.05); }
  #send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; box-shadow: none; }
  #send-btn svg { width: 20px; height: 20px; fill: white; }

  /* ===== TAB SWITCHER ===== */
  .tab-bar {
    display: flex; gap: 4px;
    padding: 10px 24px 0;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .tab-btn {
    padding: 8px 18px; font-size: 13px; font-weight: 500;
    border: none; background: transparent; cursor: pointer;
    color: var(--text-muted); border-radius: 10px 10px 0 0;
    border-bottom: 2.5px solid transparent;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
  }
  .tab-btn:hover { color: var(--accent); background: var(--accent-light); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

  /* ===== EXPERIMENT LOG PANEL ===== */
  #exp-panel {
    flex: 1; overflow-y: auto;
    padding: 24px 28px;
    background: linear-gradient(180deg, #fff5f8 0%, #fff0f5 100%);
    display: none; flex-direction: column; gap: 16px;
  }
  #exp-panel.active { display: flex; }

  .exp-header-row {
    display: flex; align-items: center; justify-content: space-between;
  }
  .exp-title {
    font-family: 'Playfair Display', serif;
    font-size: 18px; font-weight: 700; color: var(--text);
  }
  .exp-subtitle { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
  .export-btn {
    background: var(--accent); color: white; border: none;
    border-radius: 10px; padding: 8px 16px;
    font-size: 12px; font-weight: 600; cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    display: flex; align-items: center; gap: 6px;
    transition: opacity 0.2s;
  }
  .export-btn:hover { opacity: 0.85; }

  .exp-stats {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
  }
  .stat-card {
    background: white; border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
    box-shadow: 0 1px 6px rgba(200,60,100,0.06);
  }
  .stat-label { font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; }
  .stat-value { font-size: 24px; font-weight: 700; color: var(--accent); margin-top: 4px; font-family: 'Playfair Display', serif; }
  .stat-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

  .exp-section-title {
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    color: var(--accent); text-transform: uppercase;
    display: flex; align-items: center; gap: 6px; margin-top: 8px;
  }
  .exp-section-title::before {
    content: ''; width: 3px; height: 12px;
    background: var(--accent); border-radius: 2px; display: inline-block;
  }

  .exp-entry {
    background: white; border: 1px solid var(--border);
    border-radius: 14px; padding: 14px 16px;
    box-shadow: 0 1px 6px rgba(200,60,100,0.05);
    animation: slideIn 0.2s ease;
  }
  .exp-entry-header {
    display: flex; align-items: center; gap: 8px; margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .exp-tag {
    font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
    padding: 3px 9px; border-radius: 20px; text-transform: uppercase;
  }
  .tag-no-db { background: #fff3e0; color: #e65100; border: 1px solid #ffcc80; }
  .tag-with-db { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
  .exp-batch-info { font-size: 11px; color: var(--text-muted); }
  .exp-time { font-size: 11px; color: var(--text-muted); margin-left: auto; }

  .exp-q { font-size: 13px; color: var(--text-mid); margin-bottom: 6px; }
  .exp-q strong { color: var(--text); font-weight: 600; }
  .exp-a { font-size: 13px; color: var(--text); line-height: 1.7; }
  .exp-a-label { font-size: 10px; font-weight: 600; color: var(--accent); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }

  .exp-empty {
    text-align: center; padding: 48px 0;
    color: var(--text-muted); font-size: 14px; font-style: italic;
  }
  .exp-date-group { display: flex; flex-direction: column; gap: 8px; }
  .exp-date-label {
    font-size: 12px; font-weight: 600; color: var(--text-mid);
    background: var(--pink-pale); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px 14px;
    align-self: flex-start; margin-bottom: 2px;
  }
  .entry-delete-btn {
    background: none; border: none; cursor: pointer;
    font-size: 14px; padding: 2px 6px; border-radius: 6px;
    transition: background 0.2s; margin-left: auto;
    line-height: 1;
  }
  .entry-delete-btn:hover { background: #fde8e8; }

  /* ===== QUESTION CATEGORY STYLES ===== */
  .exp-view { display: flex; flex-direction: column; gap: 14px; }

  /* Sub-tabs inside exp panel */
  .exp-sub-tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .exp-sub-tab {
    padding: 6px 14px; font-size: 12px; font-weight: 500;
    border: 1.5px solid var(--border); border-radius: 20px;
    background: white; color: var(--text-mid); cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .exp-sub-tab:hover { border-color: var(--accent-soft); color: var(--accent); }
  .exp-sub-tab.active { background: var(--accent); color: white; border-color: var(--accent); }

  /* Question list */
  .q-list { display: flex; flex-direction: column; gap: 8px; }
  .q-item {
    background: white; border: 1.5px solid var(--border);
    border-radius: 14px; cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    overflow: hidden;
  }
  .q-item:hover { border-color: var(--accent-soft); box-shadow: 0 2px 10px rgba(214,51,132,0.1); }
  .q-item.open { border-color: var(--accent); }
  .q-item-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
  }
  .q-item-header .q-text {
    flex: 1; font-size: 13px; font-weight: 500; color: var(--text);
  }
  .q-count {
    font-size: 11px; color: var(--text-muted);
    background: var(--surface2); border-radius: 20px;
    padding: 2px 8px; white-space: nowrap;
  }
  .q-arrow {
    font-size: 11px; color: var(--text-muted);
    transition: transform 0.2s;
  }
  .q-item.open .q-arrow { transform: rotate(180deg); }
  .q-item-delete {
    background: none; border: none; cursor: pointer;
    color: var(--text-muted); font-size: 14px; padding: 2px 6px;
    border-radius: 6px; transition: color 0.2s, background 0.2s;
  }
  .q-item-delete:hover { color: #c0392b; background: #fde8e8; }

  /* Batch tabs inside question */
  .q-detail { padding: 0 16px 14px; border-top: 1px solid var(--border); }
  .batch-tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
    padding: 10px 0 8px;
  }
  .batch-tab {
    padding: 4px 12px; font-size: 11px; font-weight: 600;
    border: 1.5px solid var(--border); border-radius: 20px;
    background: white; color: var(--text-mid); cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: all 0.2s;
  }
  .batch-tab:hover { border-color: var(--accent-soft); }
  .batch-tab.active { background: var(--pink-pale); color: var(--pink-deep); border-color: var(--pink-mid); }
  .batch-tab.no-db { background: #fff3e0; color: #e65100; border-color: #ffcc80; }

  .batch-answer {
    background: var(--surface2); border-radius: 12px;
    padding: 12px 14px; font-size: 13px; line-height: 1.75;
    color: var(--text); border: 1px solid var(--border);
  }
  .batch-answer-meta {
    font-size: 10px; color: var(--text-muted);
    margin-bottom: 8px; display: flex; gap: 8px; flex-wrap: wrap;
  }

  /* Add question row */
  .add-q-row {
    display: flex; gap: 8px;
  }
  .add-q-row input {
    flex: 1; background: white; border: 1.5px solid var(--border);
    border-radius: 12px; color: var(--text);

    background: var(--accent); color: white; border: none;

    font-size: 12px; font-weight: 600; cursor: pointer;

  /* 匯出/匯入資料庫 */

  #right-panel {
    flex: 1; display: flex; flex-direction: column; overflow: hidden;

  }
  #exp-panel {
    flex: 1; overflow-y: auto;
    padding: 24px 28px;
    background: linear-gradient(180deg, #fff5f8 0%, #fff0f5 100%);
    flex-direction: column; gap: 16px;
    display: none;
  }
  #exp-panel.active { display: flex; }

  .api-section {
    border-bottom: 1px solid var(--border);

  .api-input-wrap { flex: 1; position: relative; }
  .api-input-wrap input {
    width: 100%; background: var(--surface2);
    border: 1.5px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: monospace; font-size: 12px;
    padding: 8px 36px 8px 12px; outline: none;

</style>

<script>
  // Safe storage — works on GitHub Pages, silent fail in claude.ai
  const store = {
    get(k) { try { return localStorage.getItem(k); } catch(e) { return null; } },
    set(k, v) { try { localStorage.setItem(k, v); } catch(e) {} },
  };

  let batches = JSON.parse(store.get('luna_batches') || '[]');
  let isActive = true;
  let isLoading = false;
  let history = [];
  let batchCounter = parseInt(store.get('luna_batchCounter') || '0');
  const warmOpeners = ['Wah,', 'Aduh,', 'Alhamdulillah,', 'Lho,', 'Eh,', 'Masya Allah,'];

  function exportBatches() {
    if (!batches.length) { alert('目前沒有資料可以匯出！'); return; }
    const data = { batches, batchCounter, exportedAt: new Date().toLocaleString('zh-TW') };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Luna資料庫_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.json`;
    a.click();
  }

  function importBatches(event) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const data = JSON.parse(e.target.result);
        if (!data.batches || !Array.isArray(data.batches)) throw new Error('格式錯誤');
        batches = data.batches;
        batchCounter = data.batchCounter || batches.length;
        saveBatches();
        renderLog();
        updateTotal();
        addSystemMsg(`✅ 成功匯入 ${batches.length} 筆資料庫`);
      } catch(err) {
        alert('匯入失敗，請確認是正確的 Luna 資料庫 JSON 檔案');
      }
    };
    reader.readAsText(file);
    event.target.value = '';
  }

  function saveBatches() {
    store.set('luna_batches', JSON.stringify(batches));
    store.set('luna_batchCounter', String(batchCounter));
  }

  // ===== EXPERIMENT LOG =====
  let expLog = JSON.parse(store.get('luna_expLog') || '[]');
  let apiKey = store.get('luna_apiKey') || '';

  // Default preset questions
  const DEFAULT_QUESTIONS = [
    '月經不規律是正常的嗎？',
    '白帶變多需要擔心嗎？',
    '什麼時候應該去看婦科？',
    '子宮頸癌疫苗要打幾劑？',
    '月經來肚子很痛怎麼辦？',
    '經期延遲可能是什麼原因？',
    '什麼是多囊性卵巢症候群？',
  ];
  let questions = JSON.parse(store.get('luna_questions') || 'null') || [...DEFAULT_QUESTIONS];
  let openQuestion = null;
  let activeQBatchIdx = {};

  function saveLog() { store.set('luna_expLog', JSON.stringify(expLog)); }
  function saveQuestions() { store.set('luna_questions', JSON.stringify(questions)); }

  function switchExpView(view) {
    document.getElementById('subtab-q').classList.toggle('active', view === 'q');
    document.getElementById('subtab-time').classList.toggle('active', view === 'time');
    document.getElementById('exp-view-q').style.display = view === 'q' ? 'flex' : 'none';
    document.getElementById('exp-view-time').style.display = view === 'time' ? 'flex' : 'none';
    if (view === 'q') renderQList();
    if (view === 'time') renderTimeLog();
  }

  function addQuestion() {
    const input = document.getElementById('new-q-input');
    const q = input.value.trim();
    if (!q) return;
    if (questions.includes(q)) { input.value = ''; return; }
    questions.push(q);
    saveQuestions();
    input.value = '';
    renderQList();
  }

  function deleteQuestion(idx) {
    questions.splice(idx, 1);
    saveQuestions();
    renderQList();
  }

  function toggleQuestion(idx) {
    openQuestion = openQuestion === idx ? null : idx;
    renderQList();
  }

  function renderQList() {
    const list = document.getElementById('q-list');
    if (!list) return;
    list.innerHTML = questions.map((q, idx) => {
      // Get all log entries matching this question
      const entries = expLog.filter(e => e.question.trim() === q.trim());
      const isOpen = openQuestion === idx;

      // Group entries by batchCount
      const byBatch = {};
      entries.forEach(e => {
        const key = e.hasDB ? `${e.batchNames.length}批` : '無資料';
        if (!byBatch[key]) byBatch[key] = [];
        byBatch[key].push(e);
      });
      const batchKeys = Object.keys(byBatch).sort((a, b) => {
        if (a === '無資料') return -1;
        if (b === '無資料') return 1;
        return parseInt(a) - parseInt(b);
      });

      // Active batch tab
      if (!activeQBatchIdx[idx] && batchKeys.length) activeQBatchIdx[idx] = batchKeys[0];
      const activeBatch = activeQBatchIdx[idx] || batchKeys[0];
      const activeEntries = byBatch[activeBatch] || [];

      const batchTabsHtml = batchKeys.map(k => `
        <button class="batch-tab ${k === '無資料' ? 'no-db' : ''} ${k === activeBatch ? 'active' : ''}"
          onclick="selectBatchTab(event, ${idx}, '${k}')">${k === '無資料' ? '⭕ 無資料' : `✅ ${k}`}</button>
      `).join('');

      const answersHtml = activeEntries.slice().reverse().map(e => `
        <div class="batch-answer" style="margin-bottom:8px">
          <div class="batch-answer-meta">
            <span>🕐 ${e.date} ${e.time}</span>
            ${e.hasDB ? `<span>批次：${e.batchNames.join('、')}</span>` : ''}
          </div>
          ${escHtml(e.zhAnswer)}
        </div>
      `).join('');

      const detailHtml = isOpen ? `
        <div class="q-detail">
          ${batchKeys.length === 0
            ? '<div style="padding:12px 0; font-size:13px; color:var(--text-muted); font-style:italic;">尚未有這個問題的記錄，對 Luna 提問後會自動歸類在這裡 🌸</div>'
            : `<div class="batch-tabs">${batchTabsHtml}</div>${answersHtml}`
          }
        </div>` : '';

      return `<div class="q-item ${isOpen ? 'open' : ''}">
        <div class="q-item-header" onclick="toggleQuestion(${idx})">
          <span class="q-text">${escHtml(q)}</span>
          <span class="q-count">${entries.length} 筆記錄</span>
          <span class="q-arrow">▼</span>
          <button class="q-item-delete" onclick="event.stopPropagation(); deleteQuestion(${idx})">×</button>
        </div>
        ${detailHtml}
      </div>`;
    }).join('');
  }

  function selectBatchTab(e, qIdx, batchKey) {
    e.stopPropagation();
    activeQBatchIdx[qIdx] = batchKey;
    renderQList();
  }

  function renderTimeLog() {
    const container = document.getElementById('exp-entries');
    if (!container) return;
    if (!expLog.length) {
      container.innerHTML = '<div class="exp-empty">尚無對話記錄 — 開始與 Luna 對話後會自動記錄於此 🌸</div>';
      return;
    }
    const grouped = {};
    [...expLog].reverse().forEach(e => {
      if (!grouped[e.date]) grouped[e.date] = [];
      grouped[e.date].push(e);
    });
    container.innerHTML = Object.entries(grouped).map(([date, entries]) => `
      <div class="exp-date-group">
        <div class="exp-date-label">📅 ${date}</div>
        ${entries.map(e => {
          const tagClass = e.hasDB ? 'tag-with-db' : 'tag-no-db';
          const tagText = e.hasDB ? `✅ 組B：${e.batchNames.length}批` : '⭕ 組A：無資料庫';
          const batchInfo = e.hasDB && e.batchNames.length
            ? `<span class="exp-batch-info">批次：${e.batchNames.join('、')}</span>` : '';
          return `<div class="exp-entry" data-id="${e.id}">
            <div class="exp-entry-header">
              <span class="exp-tag ${tagClass}">${tagText}</span>
              ${batchInfo}
              <span class="exp-time">${e.time}</span>
              <button class="entry-delete-btn" onclick="deleteEntry(this)" title="刪除">🗑</button>
            </div>
            <div class="exp-q"><strong>問：</strong>${escHtml(e.question)}</div>
            <div class="exp-a-label">Luna 回答（中文）</div>
            <div class="exp-a">${escHtml(e.zhAnswer)}</div>
          </div>`;
        }).join('')}
      </div>
    `).join('');
  }

  function switchTab(tab) {
    document.getElementById('tab-chat').classList.toggle('active', tab === 'chat');
    document.getElementById('tab-exp').classList.toggle('active', tab === 'exp');
    document.getElementById('chat-view').style.display = tab === 'chat' ? 'flex' : 'none';
    document.getElementById('exp-panel').classList.toggle('active', tab === 'exp');
    if (tab === 'exp') { renderQList(); renderTimeLog(); updateExpStats(); }
  }

  function logEntry(question, zhAnswer, hasDB, batchNames) {
    const now = new Date();
    expLog.push({
      id: Date.now(),
      date: now.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit' }),
      time: now.toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit' }),
      question, zhAnswer, hasDB,
      batchNames: batchNames || []
    });
    saveLog();
    updateExpStats();
    // Auto-add question to list if not already there
    if (!questions.includes(question.trim())) {
      questions.push(question.trim());
      saveQuestions();
    }
    renderQList();
    renderTimeLog();
  }

  function deleteEntry(btn) {
    const entryEl = btn.closest('.exp-entry');
    const id = entryEl.dataset.id;
    expLog = expLog.filter(e => String(e.id) !== id);
    saveLog();
    updateExpStats();
    entryEl.remove();
    renderQList();
    if (!expLog.length) renderTimeLog();
  }

  function clearAllLog() {
    expLog = [];
    saveLog();
    updateExpStats();
    renderQList();
    renderTimeLog();
  }

  function updateExpStats() {
    document.getElementById('stat-total').textContent = expLog.length;
    document.getElementById('stat-nodb').textContent = expLog.filter(e => !e.hasDB).length;
    document.getElementById('stat-withdb').textContent = expLog.filter(e => e.hasDB).length;
  }

  function exportLog() {
    if (!expLog.length) { alert('目前沒有記錄可以匯出！'); return; }
    const rows = [['編號','日期','時間','組別','批次數','資料庫批次','問題','Luna回答（中文）']];
    [...expLog].forEach((e, i) => {
      rows.push([
        i+1, e.date, e.time,
        e.hasDB ? '組B-有資料庫' : '組A-無資料庫',
        e.hasDB ? e.batchNames.length : 0,
        e.batchNames.join('|'),
        e.question.replace(/\n/g,' '),
        e.zhAnswer.replace(/\n/g,' ')
      ]);
    });
    const csv = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv], { type:'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `Luna實驗記錄_${new Date().toLocaleDateString('zh-TW').replace(/\//g,'-')}.csv`;
    a.click();
  }

  // Init on load
  updateExpStats();



  function saveApiKey() {
    const val = document.getElementById('api-key-input').value.trim();
    if (!val) { alert('請輸入 API Key！'); return; }
    apiKey = val;
    store.set('luna_apiKey', val);
    const status = document.getElementById('api-status');
    status.className = 'api-status ok';
    status.querySelector('.api-status-text').textContent = '✓ Gemini API Key 已設定';
    document.getElementById('api-key-input').value = val.slice(0,8) + '••••••••••••';
  }

  // Restore saved API key on load
  if (apiKey) {
    document.getElementById('api-key-input').value = apiKey.slice(0,8) + '••••••••••••';
    const s = document.getElementById('api-status');
    s.className = 'api-status ok';
    s.querySelector('.api-status-text').textContent = '✓ Gemini API Key 已設定';
  }

  function toggleApiVisibility() {
    const input = document.getElementById('api-key-input');
    input.type = input.type === 'password' ? 'text' : 'password';
  }

  function togglePanel() {
    const panel = document.getElementById('left-panel');
    const btn = document.getElementById('toggle-btn');
    const isCollapsed = panel.classList.toggle('collapsed');
    btn.classList.toggle('collapsed-btn', isCollapsed);
    btn.title = isCollapsed ? '展開資料庫' : '收合資料庫';
  }

  function addBatch() {
    const nameEl = document.getElementById('batch-name');
    const textEl = document.getElementById('knowledge-input');
    const text = textEl.value.trim();
    if (!text) { alert('請先貼上資料內容！'); return; }
    batchCounter++;
    const name = nameEl.value.trim() || `資料 ${batchCounter}`;
    batches.push({ id: 'b_' + Date.now(), name, text, chars: text.length });
    nameEl.value = ''; textEl.value = '';
    saveBatches();
    renderLog(); updateTotal();
  }

  function deleteBatch(id) {
    batches = batches.filter(b => b.id !== id);
    saveBatches();
    renderLog(); updateTotal();
    if (!batches.length) {
      document.getElementById('activate-btn').style.display = 'none';
      document.getElementById('total-badge').style.display = 'none';
    }
  }

  function clearAll() {
    if (!confirm('確定要清除所有資料嗎？')) return;
    batches = []; history = []; batchCounter = 0;
    saveBatches();
    renderLog(); updateTotal();
    document.getElementById('activate-btn').style.display = 'none';
    document.getElementById('total-badge').style.display = 'none';
    document.getElementById('online-label').textContent = '中文 · Bahasa Indonesia · English';
    document.getElementById('messages').innerHTML = '';
    addSystemMsg('資料庫已清除，Luna 仍可用基本婦科知識回答 🌸');
  }

  function renderLog() {
    const log = document.getElementById('training-log');
    document.getElementById('db-count').textContent = batches.length + ' 筆';
    if (!batches.length) {
      log.innerHTML = '<div class="log-empty">尚未加入任何資料</div>';
      return;
    }
    log.innerHTML = batches.map((b, i) => `
      <div class="log-item">
        <div class="log-item-left">
          <div class="log-num">${i+1}</div>
          <div>
            <div class="log-name">${escHtml(b.name)}</div>
            <div class="log-chars">${b.chars.toLocaleString()} 字元</div>
          </div>
        </div>
        <button class="log-delete" onclick="deleteBatch('${b.id}')" title="刪除">×</button>
      </div>
    `).join('');
    document.getElementById('activate-btn').style.display = 'block';
  }

  function updateTotal() {
    const total = batches.reduce((s, b) => s + b.chars, 0);
    const badge = document.getElementById('total-badge');
    if (total > 0) {
      badge.style.display = 'flex';
      document.getElementById('total-text').textContent = `共 ${batches.length} 批 · ${total.toLocaleString()} 字元`;
    } else { badge.style.display = 'none'; }
  }

  function activateLuna() {
    if (!batches.length) { alert('請先加入至少一筆資料！'); return; }
    history = [];
    document.getElementById('online-label').textContent = '已就緒 · Siap';
    const msgs = document.getElementById('messages');
    msgs.innerHTML = '';
    addSystemMsg(`資料庫已更新，Luna 載入了 ${batches.length} 筆資料 🌸`);
    const opener = warmOpeners[Math.floor(Math.random() * warmOpeners.length)];
    addBotBilingual(
      `${opener} selamat datang！🌙\n\n你好，我是 Luna，你的婦科健康小夥伴！\n\n我可以陪你聊關於婦科的各種問題，不管是身體的不舒服、月經、還是看診前的疑問，都可以問我哦 💛\n\n例如你可以問我：\n• 「月經不規律是正常的嗎？」\n• 「白帶變多需要擔心嗎？」\n• 「什麼時候應該去看婦科？」\n• 「子宮頸癌疫苗要打幾劑？」\n• 「月經來肚子很痛怎麼辦？」\n\n有什麼想問的，就直接說吧，我不會評判你的 🌸`,

  async function sendMessage() {
    if (isLoading || !isActive) return;
    const input = document.getElementById('user-input');
    const q = input.value.trim();
    if (!q) return;

    input.value = ''; input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    addUserMsg(q);
    history.push({ role: 'user', content: q });
    showTyping();

    const knowledgeText = batches.map((b, i) =>
      `【資料 ${i+1}：${b.name}】\n${b.text}`
    ).join('\n\n---\n\n');

    const knowledgeSection = knowledgeText
      ? `## 知識庫資料（嚴格規則：只能根據以下內容回答，逐字對照，不可自行補充、延伸、推測或加入任何資料庫以外的醫學知識。若問題在資料庫中找不到對應內容，必須回答「這個問題我目前的資料庫裡還沒有相關資訊，建議你諮詢專業醫師哦 🌸」）\n${knowledgeText}`
      : `## 知識庫狀態：空白
目前沒有任何資料庫內容。無論使用者問什麼醫療或婦科問題，你的回答只能是以下這句話，不可以在前後加任何其他內容、補充或感想：
中文：「目前我的資料庫還是空的，請管理員先上傳相關資料，我才能回答你的問題哦 🌸」
印尼文：「Database-ku masih kosong. Mohon admin untuk mengupload data terlebih dahulu agar aku bisa menjawab pertanyaanmu ya 🌸」
日常聊天與問候則可以正常回應。`;

    const system = `你是 Luna，一個溫暖、有印尼文化共感的女性健康 AI 夥伴，專注於婦科與女性生殖健康議題。

## 語言規則（最重要，必須嚴格遵守）
無論使用者用任何語言提問（中文、印尼文 Bahasa Indonesia、英文），你必須將回答分成兩個段落輸出：
- 第一段：用繁體中文完整回答
- 然後輸出分隔符號「|||」（只有這三個字元，不加任何文字或換行）
- 第二段：用印尼文（Bahasa Indonesia）完整回答，語氣自然，不是機械直譯

範例輸出格式：
[繁體中文回答內容...]|||[Bahasa Indonesia 回答內容...]

## 內容規則（絕對禁止違反）
- 醫療與婦科相關問題：只能根據知識庫的內容回答，禁止自行補充、延伸、推測任何資料庫以外的資訊
- 若資料庫中找不到對應的醫療答案，直接說「這個問題我目前的資料庫裡還沒有相關資訊，建議你諮詢專業醫師哦 🌸」
- 日常聊天、問候、心情分享等非醫療話題：可以自然回應，像朋友一樣陪伴對方，不受知識庫限制

## 個性與語調
- 偶爾使用印尼語感嘆詞：Wah、Aduh、Alhamdulillah、Lho、Masya Allah
- 語調溫暖，像懂你的姊妹
- 先照顧情緒，再給資訊（心情調節優先）
- 用引導式問句，讓使用者有主控感（Agency）

## 免責聲明（每次回答結尾必須附上，放在中文段落結尾與印尼文段落結尾）
中文版：「⚠️ 以上資訊僅供參考，不構成醫療診斷或建議。如有身體不適，請務必諮詢專業醫師。」
印尼文版：「⚠️ Informasi di atas hanya untuk referensi dan bukan merupakan diagnosis atau saran medis. Jika kamu merasa tidak nyaman, segera konsultasikan dengan dokter.」

${knowledgeSection}`;

    try {
      if (!apiKey) {
        removeTyping();
        addBotBilingual(
          '請先在左側設定 Gemini API Key，才能開始對話哦 🔑',
          'Mohon masukkan Gemini API Key di panel kiri terlebih dahulu ya 🔑'
        );
        isLoading = false;
        document.getElementById('send-btn').disabled = false;
        return;
      }

      // Build Gemini message history
      const geminiHistory = history.slice(0, -1).map(m => ({
        role: m.role === 'assistant' ? 'model' : 'user',
        parts: [{ text: m.content }]
      }));

      const res = await fetch(
        `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            system_instruction: { parts: [{ text: system }] },
            contents: [
              ...geminiHistory,
              { role: 'user', parts: [{ text: q }] }
            ],
            generationConfig: { maxOutputTokens: 1500, temperature: 0.7 }
          })
        }
      );
      const data = await res.json();
      if (data.error) throw new Error(data.error.message);
      const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '很抱歉，發生了問題。|||Maaf, ada masalah teknis.';
      removeTyping();
      const sepIdx = raw.indexOf('|||');
      const zhPart = (sepIdx >= 0 ? raw.slice(0, sepIdx) : raw).trim();
      const idPart = (sepIdx >= 0 ? raw.slice(sepIdx + 3) : '').trim();
      addBotBilingual(zhPart, idPart);
      history.push({ role: 'assistant', content: raw });
      logEntry(q, zhPart, batches.length > 0, batches.map(b => b.name));
    } catch (e) {
      removeTyping();
      addBotBilingual(
        'Aduh~ 發生了技術問題，請稍後再試一次 🙏',
        'Aduh~ Ada masalah teknis. Coba lagi nanti ya 🙏'
      );
      console.error(e);
    }

    isLoading = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
